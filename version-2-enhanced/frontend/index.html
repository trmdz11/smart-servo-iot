<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Servo Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="dashboard">
    <section class="hero">
      <p class="eyebrow">ESP32 IoT Project</p>
      <h1>Smart Servo Dashboard</h1>
      <p class="subtitle">Control a servo motor wirelessly through a browser-based interface.</p>
    </section>

    <section class="grid">
      <div class="card control-card">
        <h2>Servo Control</h2>
        <div class="angle-display"><span id="angleValue">90</span><small>degrees</small></div>
        <input id="servoSlider" type="range" min="0" max="180" value="90" />
        <div class="button-row">
          <button onclick="setAngle(0)">Lock</button>
          <button onclick="setAngle(90)">Neutral</button>
          <button onclick="setAngle(180)">Unlock</button>
        </div>
      </div>

      <div class="card">
        <h2>Device Status</h2>
        <p><strong>Status:</strong> <span id="statusText">Checking...</span></p>
        <p><strong>IP Address:</strong> <span id="ipText">-</span></p>
        <p><strong>Servo:</strong> <span id="servoText">Waiting</span></p>
      </div>

      <div class="card log-card">
        <h2>Activity Log</h2>
        <ul id="logList"><li>Dashboard loaded</li></ul>
      </div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
